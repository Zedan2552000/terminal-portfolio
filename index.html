<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Portfolio | Zedan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="terminal-container">
        <div class="terminal-header">
            <div class="buttons">
                <span class="close"></span>
                <span class="minimize"></span>
                <span class="maximize"></span>
            </div>
            <div class="title">zedan@portfolio: ~</div>
        </div>
        <div class="terminal-body" id="terminal-body">
            <div class="output" id="output">
                <!-- Output will be injected here -->
            </div>
            <div class="input-line">
                <span class="prompt">zedan@portfolio:~$ </span>
                <input type="text" id="command-input" autocomplete="off" spellcheck="false" autofocus>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
